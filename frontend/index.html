<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Canteen Menu Planner</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --card: #ffffff;
      --border: #ececf1;
      --text: #1f2023;
      --muted: #6b6b76;
      --accent: #10a37f;
      --accent-dark: #0e8e6d;
      --accent-light: #e6f4f0;
      --ok: #137333;
      --bad: #c5221f;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      line-height: 1.5;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 1.5rem;
    }

    h2 {
      font-size: 1rem;
      font-weight: 700;
      margin: 0 0 .5rem;
    }

    h3 {
      font-size: .88rem;
      font-weight: 600;
      margin: 0 0 .3rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      margin: 0 0 .8rem;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .04);
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 1.5rem;
      align-items: start;
    }

    /* ── Left pane ── */
    .left-pane {
      min-width: 0;
    }

    .allergen-label {
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin: 0 0 .6rem;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: .9rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: .4rem .85rem;
      border: 1px solid #d9d9e3;
      border-radius: 999px;
      cursor: pointer;
      font-size: .88rem;
      user-select: none;
      transition: background .12s, color .12s, border-color .12s;
    }

    .pill input {
      display: none;
    }

    .pill:has(input:checked) {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: .7rem 1.4rem;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .12s, transform .05s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-dark);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(1px);
    }

    .btn:disabled {
      opacity: .5;
      cursor: default;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid #d9d9e3;
      color: var(--text);
      padding: .5rem 1rem;
      border-radius: 10px;
      font-size: .88rem;
      cursor: pointer;
      display: block;
      margin-top: .8rem;
    }

    /* ── Live spinner (expandable card) ── */
    details.live-card>summary {
      display: flex;
      align-items: center;
      gap: .6rem;
      cursor: pointer;
      list-style: none;
      color: var(--muted);
      font-size: .9rem;
    }

    details.live-card>summary::-webkit-details-marker {
      display: none;
    }

    details.live-card>summary::after {
      content: "▸";
      margin-left: auto;
      font-size: .8rem;
      transition: transform .15s;
      flex: none;
    }

    details.live-card[open]>summary::after {
      transform: rotate(90deg);
    }

    details.live-card pre {
      margin-top: .7rem;
    }

    .live-step {
      font-style: italic;
    }

    .spinner {
      flex: none;
      width: 1em;
      height: 1em;
      border: 2px solid #d9d9e3;
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Status ── */
    .status {
      font-weight: 600;
      font-size: .95rem;
      margin: 0 0 .8rem;
    }

    .ok {
      color: var(--ok);
    }

    .bad {
      color: var(--bad);
    }

    .took {
      font-weight: 400;
      color: var(--muted);
    }

    /* ── Collapsibles ── */
    details.collapse>summary {
      cursor: pointer;
      font-weight: 600;
      list-style: none;
      color: var(--muted);
      font-size: .9rem;
    }

    details.collapse>summary::-webkit-details-marker {
      display: none;
    }

    details.collapse>summary::before {
      content: "▸";
      display: inline-block;
      margin-right: .4rem;
      transition: transform .15s;
    }

    details.collapse[open]>summary::before {
      transform: rotate(90deg);
    }

    pre {
      white-space: pre-wrap;
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .6rem;
      margin: .6rem 0 0;
      font-size: .78rem;
      max-height: 260px;
      overflow: auto;
    }

    /* ── Validation ── */
    .check {
      margin: .25rem 0;
      font-size: .9rem;
    }

    li.err {
      color: var(--bad);
    }

    ul {
      margin: .2rem 0 .5rem 1.2rem;
      padding: 0;
    }

    /* ── Right pane ── */
    .right-pane {
      min-width: 0;
    }

    /* Summary card with green header */
    .summary-card {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--accent-dark);
      margin-bottom: .8rem;
      box-shadow: 0 1px 3px rgba(16, 163, 127, .15);
    }

    .summary-header {
      background: var(--accent);
      color: #fff;
      padding: .75rem 1.2rem;
    }

    .summary-header h2 {
      color: #fff;
      margin: 0;
      font-size: 1rem;
    }

    .summary-header p {
      color: rgba(255, 255, 255, .8);
      font-size: .8rem;
      margin: .15rem 0 0;
    }

    .summary-body {
      background: var(--card);
      padding: .9rem 1.2rem;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .summary-stat {
      font-size: .9rem;
      margin: .15rem 0;
    }

    .summary-stat strong {
      color: var(--text);
    }

    .summary-total {
      margin-top: .75rem;
      padding-top: .6rem;
      border-top: 1px solid var(--border);
      font-size: .95rem;
    }

    /* ── Week canvas ── */
    .week-canvas {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .04);
    }

    .week-row {
      display: grid;
      grid-template-columns: 110px 1fr;
      border-bottom: 1px solid var(--border);
    }

    .week-row:last-child {
      border-bottom: none;
    }

    .week-day-label {
      padding: .8rem 1rem;
      font-weight: 700;
      font-size: .88rem;
      color: var(--text);
      border-right: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      background: #f9f9fb;
    }

    .week-dishes {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .dish {
      padding: .7rem 1rem;
      font-size: .86rem;
    }

    .dish+.dish {
      border-left: 1px solid var(--border);
    }

    .track-label {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: .2rem;
    }

    .dish-name {
      font-weight: 600;
      margin-bottom: .3rem;
    }

    .dish ul {
      margin: 0;
      padding-left: 1.1rem;
      color: var(--muted);
    }

    .dish li {
      margin: .1rem 0;
    }

    [hidden] {
      display: none !important;
    }

    @media print {
      body {
        margin: 0;
        padding: 1cm;
        max-width: none;
        background: #fff;
      }

      .no-print {
        display: none !important;
      }

      .layout {
        display: block;
      }

      .day-row {
        box-shadow: none;
        page-break-inside: avoid;
      }
    }

    @media (max-width: 700px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .day-dishes {
        grid-template-columns: 1fr;
      }

      .dish+.dish {
        border-left: none;
        border-top: 1px solid var(--border);
      }
    }
  </style>
</head>

<body>
  <h1>Canteen Weekly Menu Planner</h1>

  <div class="layout">

    <!-- ── Left pane ── -->
    <div class="left-pane">

      <div class="card no-print">
        <p class="allergen-label">Select allergies / dietary restrictions</p>
        <div class="pills">
          <label class="pill"><input type="checkbox" class="allergen" value="gluten"> Gluten</label>
          <label class="pill"><input type="checkbox" class="allergen" value="nuts"> Nuts</label>
          <label class="pill"><input type="checkbox" class="allergen" value="dairy"> Dairy</label>
        </div>
        <button id="go" class="btn btn-primary">Generate week</button>
      </div>

      <details id="live" class="card live-card no-print" hidden>
        <summary>
          <span class="spinner"></span>
          <span class="live-step" id="liveStep">Thinking…</span>
          <span class="took" id="liveTimer"></span>
        </summary>
        <pre id="reasoningFull"></pre>
      </details>

      <div id="status" class="status"></div>

      <div id="meta" hidden>
        <button class="btn-ghost no-print" onclick="window.print()">Print for chef</button>
      </div>

    </div>

    <!-- ── Right pane ── -->
    <div class="right-pane">

      <div id="summary"></div>
      <div class="week-canvas" id="week" hidden></div>

    </div>

  </div>

  <script>
    const go = document.getElementById("go");
    const live = document.getElementById("live");
    const liveStep = document.getElementById("liveStep");
    const liveTimer = document.getElementById("liveTimer");
    const statusEl = document.getElementById("status");
    const meta = document.getElementById("meta");
    const reasoningFull = document.getElementById("reasoningFull");
    const summaryEl = document.getElementById("summary");
    const weekEl = document.getElementById("week");

    go.addEventListener("click", () => {
      go.disabled = true;
      statusEl.textContent = "";
      meta.hidden = true;
      weekEl.innerHTML = "";
      weekEl.hidden = true;
      summaryEl.innerHTML = "";
      live.open = false;
      live.hidden = true;
      live.querySelector(".spinner").hidden = false;
      reasoningFull.textContent = "";
      liveStep.textContent = "Thinking…";
      live.hidden = false;

      const startedAt = Date.now();
      const elapsed = () => ((Date.now() - startedAt) / 1000).toFixed(1);

      liveTimer.textContent = "0.0s";
      const timerInterval = setInterval(() => { liveTimer.textContent = elapsed() + "s"; }, 100);

      const params = new URLSearchParams();
      document.querySelectorAll(".allergen:checked").forEach(c => params.append("exclude", c.value));

      const es = new EventSource("/plan?" + params.toString());
      let reasoning = "";

      es.addEventListener("thinking", e => {
        reasoning += JSON.parse(e.data).text;
        liveStep.textContent = currentStep(reasoning);
        reasoningFull.textContent = reasoning;
        live.hidden = false;
      });

      es.addEventListener("done", e => {
        const data = JSON.parse(e.data);
        clearInterval(timerInterval);
        live.querySelector(".spinner").hidden = true;
        liveStep.textContent = "Thinking complete";

        statusEl.innerHTML = (data.valid
          ? `<span class="ok">Valid plan &check;</span>`
          : `<span class="bad">Invalid plan</span>`)
          + ` <span class="took">in ${elapsed()}s</span>`;

        weekEl.innerHTML = data.days.map(renderDay).join("");
        weekEl.hidden = false;
        summaryEl.innerHTML = renderSummary(data.summary);
        meta.hidden = false;

        es.close();
        go.disabled = false;
        fetch("/log/success", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });
      });

      es.addEventListener("failed", e => {
        clearInterval(timerInterval);
        live.hidden = true;
        statusEl.innerHTML =
          `<span class="bad">Failed: ${JSON.parse(e.data).detail}</span> <span class="took">after ${elapsed()}s</span>`;
        es.close();
        go.disabled = false;
      });

      es.onerror = () => {
        if (es.readyState === EventSource.CLOSED) return;
        clearInterval(timerInterval);
        live.hidden = true;
        statusEl.innerHTML = `<span class="bad">Connection lost</span>`;
        es.close();
        go.disabled = false;
      };
    });

    function currentStep(log) {
      const headers = [...log.matchAll(/\*\*(.+?)\*\*/g)];
      if (headers.length) return headers[headers.length - 1][1];
      const line = log.trim().split("\n").find(l => l.trim());
      return line ? line.replace(/[*#]/g, "").trim() : "Thinking…";
    }

    function escapeHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function renderSummary(s) {
      if (!s) return "";
      const fmt = n => n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return `
        <div class="summary-card">
          <div class="summary-header">
            <h2>Weekly Summary</h2>
            <p>Cost &amp; nutrition per person · per week</p>
          </div>
          <div class="summary-body">
            <div class="summary-grid">
              <div>
                <h3>Meat track</h3>
                <p class="summary-stat">Cost: <strong>€${fmt(s.meat_track.total_cost_eur)}</strong></p>
                <p class="summary-stat">Calories: <strong>${Math.round(s.meat_track.total_calories_kcal)} kcal</strong></p>
                <p class="summary-stat">Allergens: ${s.meat_track.allergens.join(", ") || "None"}</p>
              </div>
              <div>
                <h3>Vegetarian track</h3>
                <p class="summary-stat">Cost: <strong>€${fmt(s.vegetarian_track.total_cost_eur)}</strong></p>
                <p class="summary-stat">Calories: <strong>${Math.round(s.vegetarian_track.total_calories_kcal)} kcal</strong></p>
                <p class="summary-stat">Allergens: ${s.vegetarian_track.allergens.join(", ") || "None"}</p>
              </div>
            </div>
            <div class="summary-total">Grand total for week (10 servings): <strong>€${fmt(s.grand_total_cost_eur)}</strong></div>
          </div>
        </div>`;
    }

    function renderDay(day) {
      return `
        <div class="week-row">
          <div class="week-day-label">${day.day}</div>
          <div class="week-dishes">
            ${renderDish(day.meat_dish)}
            ${renderDish(day.vegetarian_dish)}
          </div>
        </div>`;
    }

    function renderDish(dish) {
      const items = dish.ingredients
        .map(i => `<li>${i.quantity_g.toFixed(0)} g — ${escapeHtml(i.product_name)}</li>`)
        .join("");
      return `
        <div class="dish">
          <div class="track-label">${dish.track}</div>
          <div class="dish-name">${escapeHtml(dish.name)}</div>
          <ul>${items}</ul>
        </div>`;
    }
  </script>
</body>

</html>
